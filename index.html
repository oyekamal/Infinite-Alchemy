<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Infinite Alchemy</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Cinzel+Decorative:wght@400;700&family=Nunito:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
      /* ═══════════════════════════════
         DESIGN TOKENS — PLAYFUL LIGHT
         inspired by Summer Sky palette
      ═══════════════════════════════ */
      :root {
        --bg:       #F0FBFE;
        --surface:  #FFFFFF;
        --card:     #FFFFFF;
        --card-h:   #F0FBFE;
        --card-sel: #E4F6FC;
        --border:   #C8EAF6;
        --border-b: #9AD6EE;

        /* Amethyst purple — slot 1 (Element I) */
        --sky:      #9956DE;
        --sky-b:    #C49AEF;
        --sky-d:    #6B2FAF;

        /* Texas Rose orange — slot 2 (Element II) */
        --rose:     #FF9A2E;
        --rose-b:   #FFD09E;
        --rose-d:   #C06010;

        /* Pastel Green — success / new */
        --sage:     #5BC94E;
        --sage-b:   #A8E89E;
        --sage-d:   #2E8A24;

        /* Summer Sky — primary UI accent */
        --teal:     #1FA7E1;
        --teal-d:   #0D7AAD;

        --text:     #1E2A38;
        --text-m:   #5A6E82;
        --text-d:   #A0B4C4;

        --success:  var(--sage);
        --error:    var(--rose);

        /* legacy aliases */
        --gold:     var(--teal);
        --gold-b:   #6ED1CF;
        --gold-d:   var(--teal-d);
        --violet:   var(--sky);
        --violet-d: var(--sky-d);
      }

      /* ═══════════════════════════════
         BASE
      ═══════════════════════════════ */
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      html {
        height: 100%;
        height: -webkit-fill-available;
      }

      body {
        min-height: 100%;
        min-height: -webkit-fill-available;
        overflow: hidden;
        background: var(--bg);
        color: var(--text);
        font-family: 'Nunito', system-ui, sans-serif;
        -webkit-font-smoothing: antialiased;
        -webkit-tap-highlight-color: transparent;
        overscroll-behavior: none;
      }

      #root {
        height: 100vh;
        height: 100dvh;
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }

      /* Soft sky gradient atmosphere */
      body::before {
        content: '';
        position: fixed; inset: 0; pointer-events: none; z-index: 0;
        background:
          radial-gradient(ellipse 70% 50% at 50% -10%, rgba(31,167,225,0.08) 0%, transparent 65%),
          radial-gradient(ellipse 50% 35% at 0% 100%,  rgba(91,201,78,0.06) 0%, transparent 55%),
          radial-gradient(ellipse 40% 30% at 100% 50%, rgba(153,86,222,0.05) 0%, transparent 50%);
      }

      /* ═══════════════════════════════
         KEYFRAMES
      ═══════════════════════════════ */
      @keyframes bloom {
        0%   { transform: scale(0.1) rotate(-30deg); opacity: 0; }
        55%  { transform: scale(1.2) rotate(4deg);   opacity: 1; }
        80%  { transform: scale(0.95); }
        100% { transform: scale(1) rotate(0deg);     opacity: 1; }
      }

      @keyframes shake {
        0%,100% { transform: translateX(0); }
        15%  { transform: translateX(-8px) rotate(-2deg); }
        35%  { transform: translateX(8px)  rotate(2deg); }
        55%  { transform: translateX(-5px) rotate(-1deg); }
        75%  { transform: translateX(5px)  rotate(1deg); }
      }

      @keyframes pop-in {
        0%   { transform: scale(0.7); opacity: 0; }
        70%  { transform: scale(1.08); }
        100% { transform: scale(1); opacity: 1; }
      }

      @keyframes glow-pulse {
        0%,100% { opacity: 0.7; }
        50%     { opacity: 1; }
      }

      @keyframes spin-slow {
        from { transform: rotate(0deg); }
        to   { transform: rotate(360deg); }
      }

      @keyframes spin-rev {
        from { transform: rotate(0deg); }
        to   { transform: rotate(-360deg); }
      }

      @keyframes toast-up {
        0%   { transform: translateX(-50%) translateY(20px) scale(0.95); opacity: 0; }
        60%  { transform: translateX(-50%) translateY(-4px) scale(1.02); }
        100% { transform: translateX(-50%) translateY(0) scale(1); opacity: 1; }
      }

      @keyframes title-shimmer {
        0%   { background-position: -200% center; }
        100% { background-position: 200% center; }
      }

      @keyframes new-card-pulse {
        0%,100% { box-shadow: 0 0 0 0 rgba(78,142,106,0.4); }
        50%     { box-shadow: 0 0 0 5px rgba(78,142,106,0); }
      }

      @keyframes fadeIn {
        from { opacity: 0; }
        to   { opacity: 1; }
      }

      /* ═══════════════════════════════
         TYPOGRAPHY
      ═══════════════════════════════ */
      .font-cinzel      { font-family: 'Cinzel', serif; }
      .font-cinzel-deco { font-family: 'Cinzel Decorative', serif; }
      .font-nunito      { font-family: 'Nunito', sans-serif; }

      /* ═══════════════════════════════
         ANIMATIONS
      ═══════════════════════════════ */
      .anim-bloom   { animation: bloom 0.65s cubic-bezier(0.34,1.56,0.64,1) forwards; }
      .anim-shake   { animation: shake 0.45s ease-in-out; }
      .anim-pop     { animation: pop-in 0.3s cubic-bezier(0.34,1.56,0.64,1) forwards; }
      .anim-pulse   { animation: glow-pulse 2s ease-in-out infinite; }
      .anim-toast   { animation: toast-up 0.4s cubic-bezier(0.34,1.56,0.64,1) forwards; }
      .anim-fadein  { animation: fadeIn 0.25s ease; }
      .anim-spin    { animation: spin-slow 1.4s linear infinite; }
      .anim-spinrev { animation: spin-rev 2.2s linear infinite; }
      .anim-new     { animation: new-card-pulse 1.8s ease-in-out infinite; }

      /* ═══════════════════════════════
         HEADER
      ═══════════════════════════════ */
      .app-header {
        display: flex; align-items: center; justify-content: space-between;
        padding: 0 16px;
        height: 54px;
        flex-shrink: 0;
        background: var(--teal);
        border-bottom: none;
        position: relative; z-index: 10;
        box-shadow: 0 2px 12px rgba(31,167,225,0.35);
      }

      /* ═══════════════════════════════
         TITLE
      ═══════════════════════════════ */
      .title-text {
        font-family: 'Nunito', sans-serif;
        font-size: 17px; font-weight: 900;
        color: #FFFFFF;
        letter-spacing: 0.03em;
        white-space: nowrap;
        text-shadow: 0 1px 6px rgba(0,0,0,0.15);
      }

      /* ═══════════════════════════════
         STAGE BADGE
      ═══════════════════════════════ */
      .stage-pill {
        font-family: 'Nunito', sans-serif; font-size: 9px; font-weight: 800;
        letter-spacing: 0.06em; text-transform: uppercase;
        color: var(--teal); border: none;
        border-radius: 12px; padding: 2px 8px;
        background: rgba(255,255,255,0.95);
        white-space: nowrap;
        box-shadow: 0 1px 4px rgba(0,0,0,0.12);
      }

      /* ═══════════════════════════════
         ACTION BUTTON
      ═══════════════════════════════ */
      .act-btn {
        display: flex; align-items: center; justify-content: center;
        width: 36px; height: 36px; border-radius: 50%;
        background: rgba(255,255,255,0.2); border: none;
        color: #fff; cursor: pointer; position: relative;
        transition: all 0.15s; font-size: 14px;
        -webkit-tap-highlight-color: transparent;
        flex-shrink: 0;
      }
      .act-btn:hover { background: rgba(255,255,255,0.3); }
      .act-btn:active { transform: scale(0.88); }

      /* ═══════════════════════════════
         DUAL LAYOUT
      ═══════════════════════════════ */
      .dual-layout {
        flex: 1;
        display: flex;
        min-height: 0;
        overflow: hidden;
        position: relative; z-index: 1;
      }

      /* ═══════════════════════════════
         ELEMENT PANEL (left / right)
      ═══════════════════════════════ */
      .el-panel {
        flex: 1;
        display: flex; flex-direction: column;
        min-height: 0; overflow: hidden;
        background: var(--bg);
      }
      .left-panel  { border-right: 2px solid var(--border); }
      .right-panel { border-left:  2px solid var(--border); }

      /* Panel slot header */
      .panel-header {
        flex-shrink: 0;
        display: flex; align-items: center;
        padding: 10px 12px; gap: 9px;
        background: var(--surface);
        min-height: 50px;
        box-shadow: 0 2px 8px rgba(31,167,225,0.08);
        border-bottom: 2px solid;
      }

      .panel-slot-num {
        width: 26px; height: 26px;
        border-radius: 50%;
        display: flex; align-items: center; justify-content: center;
        font-family: 'Nunito', sans-serif; font-size: 13px; font-weight: 900;
        color: #fff; flex-shrink: 0;
        box-shadow: 0 2px 8px rgba(0,0,0,0.15);
      }

      .panel-slot-info {
        display: flex; flex-direction: column; gap: 1px; min-width: 0; flex: 1;
      }
      .panel-slot-label {
        font-family: 'Nunito', sans-serif; font-size: 9px; font-weight: 800;
        letter-spacing: 0.1em; text-transform: uppercase;
      }
      .panel-slot-active {
        font-family: 'Nunito', sans-serif; font-size: 13px; font-weight: 900;
        white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      }
      .panel-slot-hint {
        font-family: 'Nunito', sans-serif; font-size: 11px; font-weight: 600;
        color: var(--text-d);
      }

      /* Panel group tabs */
      .panel-group-tabs {
        flex-shrink: 0;
        display: flex; align-items: center;
        gap: 5px; padding: 8px 10px;
        overflow-x: auto; overflow-y: hidden;
        background: var(--surface);
        border-bottom: 1px solid var(--border);
        scrollbar-width: none;
      }
      .panel-group-tabs::-webkit-scrollbar { display: none; }

      .panel-g-tab {
        display: flex; align-items: center; gap: 3px;
        padding: 5px 10px;
        border-radius: 20px; flex-shrink: 0; cursor: pointer;
        font-family: 'Nunito', sans-serif; font-size: 11px; font-weight: 700;
        background: var(--bg); border: 2px solid var(--border);
        color: var(--text-m);
        transition: all 0.15s;
        white-space: nowrap;
        -webkit-tap-highlight-color: transparent;
      }
      .panel-g-tab:hover { background: var(--card-h); border-color: var(--border-b); }
      .panel-g-tab.active { font-weight: 800; color: #fff; border-color: transparent; }
      .panel-g-tab:disabled { cursor: not-allowed; }

      .panel-g-count {
        font-size: 9px; font-weight: 700;
        background: rgba(255,255,255,0.3);
        border-radius: 8px; padding: 0 4px;
        min-width: 14px; text-align: center;
      }
      .panel-g-tab:not(.active) .panel-g-count {
        background: rgba(0,0,0,0.07); color: var(--text-m);
      }

      /* Panel element grid */
      .panel-grid-wrap {
        flex: 1; min-height: 0;
        overflow-y: auto; overflow-x: hidden;
        padding: 10px;
        background: var(--bg);
        -webkit-overflow-scrolling: touch;
      }

      .panel-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 7px;
      }

      /* Element card in panel */
      .panel-el-card {
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        padding: 8px 4px 8px;
        border: 2px solid var(--border);
        border-radius: 14px;
        cursor: pointer; position: relative; overflow: hidden;
        transition: transform 0.12s, box-shadow 0.15s, border-color 0.12s;
        min-height: 76px;
        background: var(--card);
        box-shadow: 0 2px 6px rgba(31,167,225,0.08);
        -webkit-tap-highlight-color: transparent;
      }
      .panel-el-card:hover {
        transform: translateY(-3px);
        box-shadow: 0 6px 18px rgba(31,167,225,0.15);
        border-color: var(--border-b);
      }
      .panel-el-card:active { transform: scale(0.89); box-shadow: none; }
      .panel-el-card.is-new {
        animation: new-card-pulse 1.8s ease-in-out infinite;
        border-color: var(--sage);
      }

      .panel-el-emoji {
        font-size: 26px; line-height: 1;
        margin-bottom: 5px; pointer-events: none;
      }
      .panel-el-name {
        font-family: 'Nunito', sans-serif;
        font-size: 10.5px; font-weight: 800;
        color: var(--text); text-align: center;
        line-height: 1.2; word-break: break-word;
        max-width: 100%; pointer-events: none;
      }
      .panel-el-bar {
        position: absolute; bottom: 0; left: 0; right: 0;
        height: 4px; border-radius: 0 0 14px 14px; opacity: 0.6;
      }
      .panel-new-badge {
        position: absolute; top: 4px; left: 5px;
        font-size: 7px; font-weight: 900;
        color: var(--sage-d); text-transform: uppercase; letter-spacing: 0.04em;
        font-family: 'Nunito', sans-serif;
      }
      .panel-sel-badge {
        position: absolute; top: 4px; right: 5px;
        width: 16px; height: 16px; border-radius: 50%;
        display: flex; align-items: center; justify-content: center;
        font-size: 9px; font-weight: 900; color: #fff;
        font-family: 'Nunito', sans-serif;
        box-shadow: 0 1px 4px rgba(0,0,0,0.2);
      }

      /* Panel empty state */
      .panel-empty {
        display: flex; flex-direction: column; align-items: center;
        padding: 40px 16px; gap: 8px; text-align: center;
      }

      /* ═══════════════════════════════
         CENTER COMBINATION COLUMN
      ═══════════════════════════════ */
      .combo-center {
        flex: 0 0 200px;
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        padding: 14px 14px;
        background: var(--surface);
        gap: 7px;
        overflow-y: auto; overflow-x: hidden;
        box-shadow: 0 0 0 2px var(--border) inset;
      }

      /* Vertical slot card */
      .v-slot-card {
        width: 100%; max-width: 164px;
        min-height: 78px;
        border: 2.5px dashed var(--border);
        border-radius: 16px;
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        padding: 10px 8px 8px; background: var(--bg);
        cursor: default; position: relative; overflow: hidden;
        transition: all 0.2s;
      }
      .v-slot-card.filled {
        cursor: pointer; border-style: solid;
        background: var(--card);
        box-shadow: 0 3px 12px rgba(0,0,0,0.08);
      }
      .v-slot-card.filled:active { transform: scale(0.94); }

      .v-slot-label {
        font-family: 'Nunito', sans-serif; font-size: 8px; font-weight: 800;
        letter-spacing: 0.12em; text-transform: uppercase;
        position: absolute; top: 5px; left: 0; right: 0; text-align: center;
      }

      /* Vertical result card */
      .v-result-card {
        width: 100%; max-width: 164px;
        min-height: 78px;
        border: 2.5px dashed var(--border);
        border-radius: 16px;
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        padding: 10px 8px 8px; background: var(--bg);
        position: relative; overflow: hidden;
      }

      .v-sep {
        display: flex; align-items: center; justify-content: center;
        font-size: 18px; color: var(--text-d);
        font-weight: 900; line-height: 1; user-select: none;
        font-family: 'Nunito', sans-serif;
      }

      /* ═══════════════════════════════
         GRIMOIRE DRAWER
      ═══════════════════════════════ */
      .grimoire {
        position: fixed; top: 0; right: 0; bottom: 0;
        width: min(320px, 90vw);
        background: var(--surface);
        border-left: 2px solid var(--border);
        box-shadow: -8px 0 32px rgba(31,167,225,0.1);
        z-index: 100;
        display: flex; flex-direction: column;
        transition: transform 0.32s cubic-bezier(0.4,0,0.2,1);
      }

      /* ═══════════════════════════════
         DISCOVERY ENTRY
      ═══════════════════════════════ */
      .disc-entry {
        display: flex; align-items: center; gap: 11px;
        padding: 9px 12px;
        background: var(--card);
        border: 2px solid var(--border);
        border-left: 4px solid var(--teal);
        border-radius: 12px;
        transition: border-left-color 0.15s;
      }
      .disc-entry:hover { border-left-color: var(--sky); }

      /* ═══════════════════════════════
         TOAST
      ═══════════════════════════════ */
      .toast {
        position: fixed; bottom: 20px; left: 50%;
        transform: translateX(-50%);
        z-index: 200;
        display: flex; align-items: center; gap: 9px;
        padding: 11px 20px; border-radius: 24px;
        font-family: 'Nunito', sans-serif; font-size: 13px; font-weight: 800;
        white-space: nowrap; max-width: calc(100vw - 32px);
        border: none;
      }
      .toast.success {
        background: var(--sage); color: #fff;
        box-shadow: 0 4px 20px rgba(91,201,78,0.4);
      }
      .toast.error {
        background: var(--rose); color: #fff;
        box-shadow: 0 4px 20px rgba(255,154,46,0.4);
      }
      .toast.info {
        background: var(--teal); color: #fff;
        box-shadow: 0 4px 20px rgba(31,167,225,0.4);
      }

      /* ═══════════════════════════════
         SCROLLBAR
      ═══════════════════════════════ */
      ::-webkit-scrollbar { width: 4px; height: 4px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
      ::-webkit-scrollbar-thumb:hover { background: var(--border-b); }

      /* ═══════════════════════════════
         RESPONSIVE — mobile stack
      ═══════════════════════════════ */
      @media (max-width: 640px) {
        .dual-layout { flex-direction: column; }

        .combo-center {
          flex: 0 0 auto;
          flex-direction: row;
          justify-content: center;
          align-items: center;
          flex-wrap: wrap;
          gap: 6px;
          padding: 8px 12px;
          border-left: none; border-right: none;
          border-bottom: 1px solid var(--border);
          box-shadow: none;
        }

        .v-slot-card, .v-result-card {
          width: auto; min-width: 80px; max-width: 100px;
          min-height: 60px;
        }

        .panel-grid {
          grid-template-columns: repeat(4, 1fr);
        }

        .el-panel { min-height: 200px; }
      }

      @media (min-width: 641px) and (max-width: 900px) {
        .combo-center { flex: 0 0 168px; }
        .panel-grid   { grid-template-columns: repeat(2, 1fr); }
      }

      /* Legacy class refs — kept for HistoryDrawer & unused components */
      .combo-zone, .group-tabs, .element-grid-wrap, .element-grid,
      .el-tile, .el-emoji, .el-name, .sel-badge, .new-badge,
      .g-tab, .g-tab-count, .slot-card, .slot-label, .slot-emoji,
      .slot-name, .slot-hint, .slot-placeholder, .slot-placeholder-text,
      .result-card, .combo-sep, .search-wrap, .search-input, .search-icon,
      .group-section-header, .browser-panel, .workspace-panel,
      .mobile-only, .empty-state { display: none !important; }
    </style>
